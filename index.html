    const[bh,bm]=bed.split(":").map(Number);

  };

        )

    // Days

              R("button",{onClick:function(){setEditing(null);},style:{background:"#eee",border:"none",borderRadius:9,padding:"8px 10px",fontSize:13,cursor:"pointer"}},"✕")

      R("div",{style:{fontWeight:700,fontSize:14,marginBottom:10}},"⚙️ Configurar Senha do Cardapio"),
      R("div",{style:{display:"flex",gap:8}},
        R("input",{style:{flex:1,padding:"10px 12px",borderRadius:10,border:"1.5px solid #E5E8F0",fontSize:14,outline:"none"},

        R("span",{style:{display:"flex",alignItems:"center",fontSize:12,color:"#888"}},"PIN")
      )

  );
}
